  <h2 style="padding:10px;">Hello, <a style="text-transform: uppercase; background: linear-gradient(135deg, #ff0000 0%, #8E54E9 100%);"> {{ loggedInUser }}</a> </h2>
<div class="topbar">
  <h1>{{ board?.name }}</h1>
  <button class="logout-btn" (click)="logout()">Logout</button>
</div>

<div class="board-container">
  <!-- List columns with drag-drop support -->
  <div
    class="list"
    *ngFor="let list of board?.lists"
    cdkDropList
    [id]="'list-' + list.id"
    [cdkDropListData]="list.cards"
    [cdkDropListConnectedTo]="connectedLists"
    (cdkDropListDropped)="drop($event, list)"
  >
    <h3>{{ list.name }}</h3>

    <!-- Cards in list -->
    <div class="card" *ngFor="let card of list.cards" cdkDrag>
      <p class="card-title">{{ card.title }}</p>

      <!-- Display assigned user -->
      <small *ngIf="card.assigned_to">
        Assigned: {{ card.assigned_to.username }}
      </small>

      <!-- Assign user dropdown -->
      <select class="assign-select" (change)="assignUser(card, $event)">
        <option value="">Assign User</option>
        <option *ngFor="let user of users" [value]="user.id">
          {{ user.username }}
        </option>
      </select>
    </div>

    <!-- Add card form -->
    <div class="add-card-container">
      <input
        #newCardInput
        type="text"
        placeholder="+ Add a card..."
        class="add-card-input"
        (keydown.enter)="createCard(list.id, newCardInput.value, newCardInput)"
      />
      <button
        class="add-card-btn"
        (click)="createCard(list.id, newCardInput.value, newCardInput)"
      >
        Add
      </button>
    </div>
  </div>
</div>

<hr />

<!-- Activity feed -->
<div class="activity-section">
  <h2>Activity Log</h2>
  <div class="activity-item" *ngFor="let act of board?.activities">
    <strong>{{ act.user?.username || 'Unknown' }}</strong>
    {{ act.action }}
    <div class="timestamp">
      {{ act.created_at | date: 'short' }}
    </div>
  </div>
</div>
