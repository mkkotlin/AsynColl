<h2>{{ board?.name }}</h2>

<div style="display: flex; gap: 20px;">

  <div *ngFor="let list of board?.lists"
       cdkDropList
       [id]="'list-' + list.id"
       [cdkDropListData]="list.cards"
       [cdkDropListConnectedTo]="connectedLists"
       (cdkDropListDropped)="drop($event, list)"
       style="width: 250px; border: 1px solid gray; padding: 10px;">

    <h3>{{ list.name }}</h3>

    <div *ngFor="let card of list.cards"
         cdkDrag
         style="padding: 10px; margin: 5px; background: #eee; cursor: grab;">

      {{ card.title }}

    </div>

  </div>

</div>
