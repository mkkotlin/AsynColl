<h2>Login</h2>

<input
  type="text"
  [(ngModel)]="username"
  placeholder="Username"
/>

<br><br>

<input
  type="password"
  [(ngModel)]="password"
  placeholder="Password"
/>

<br><br>

<button (click)="login()">
  Login
</button>

<p class="auth-link">Don't have account?<a routerLink="/register">Click here to register</a></p>
